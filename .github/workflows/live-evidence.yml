name: Staging live evidence

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Config available to the staging runner
        required: true
        default: docs/examples/router.production.yaml
        type: string
      max_artifact_age_seconds:
        description: Maximum accepted conformance artifact age
        required: true
        default: "3600"
        type: string
      classifier_dataset:
        description: Redacted labeled dataset for the configured classifier gate
        required: true
        default: examples/eval.production.jsonl
        type: string
      deployment_url:
        description: Already deployed candidate router base URL
        required: true
        default: http://127.0.0.1:8080
        type: string
      deployment_duration_seconds:
        description: Sustained mixed-workload measurement window
        required: true
        default: "300"
        type: string

permissions:
  contents: read

jobs:
  provider-promotion:
    name: Live provider/model promotion gate
    runs-on:
      - self-hosted
      - router-staging
    environment: router-staging
    timeout-minutes: 30
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout candidate revision
        uses: actions/checkout@v4

      - name: Validate staging config
        run: cargo run --locked -- --config "${{ inputs.config_path }}" validate

      - name: Run live provider/model conformance
        id: conformance
        continue-on-error: true
        run: |
          mkdir -p artifacts/live
          cargo run --locked -- --config "${{ inputs.config_path }}" \
            provider-conformance-matrix \
            "staging promotion ${GITHUB_SHA}" \
            --output artifacts/live/provider-conformance.json

      - name: Enforce fresh versioned promotion evidence
        if: steps.conformance.outcome == 'success'
        run: |
          cargo run --locked -- --config "${{ inputs.config_path }}" \
            provider-promotion-gate artifacts/live/provider-conformance.json \
            --max-age-seconds "${{ inputs.max_artifact_age_seconds }}" \
            --output artifacts/live/provider-promotion.json

      - name: Upload sanitized live evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-provider-evidence-${{ github.sha }}
          path: artifacts/live/
          if-no-files-found: error

      - name: Preserve conformance failure
        if: steps.conformance.outcome != 'success'
        run: exit 1

  classifier-promotion:
    name: Live classifier promotion gate
    runs-on:
      - self-hosted
      - router-staging
    environment: router-staging
    timeout-minutes: 30
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout candidate revision
        uses: actions/checkout@v4

      - name: Run credentialed classifier and failure-injection gate
        id: classifier
        continue-on-error: true
        run: |
          mkdir -p artifacts/live
          cargo run --locked -- --config "${{ inputs.config_path }}" \
            classifier-live-gate "${{ inputs.classifier_dataset }}" \
            --revision "${GITHUB_SHA}" \
            --smoke-runs 5 \
            --min-adapter-success-rate 0.95 \
            --max-fallback-rate 0.05 \
            --max-smoke-p95-ms 5000 \
            --holdout-ratio 0.20 \
            --holdout-seed 2709397542 \
            --min-holdout-examples 10 \
            --min-tier-accuracy 0.90 \
            --min-domain-accuracy 0.90 \
            --output artifacts/live/classifier-promotion.json

      - name: Upload sanitized classifier evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-classifier-evidence-${{ github.sha }}
          path: artifacts/live/classifier-promotion.json
          if-no-files-found: error

      - name: Preserve classifier gate failure
        if: steps.classifier.outcome != 'success'
        run: exit 1

  stream-promotion:
    name: Live stream lifecycle promotion gate
    runs-on:
      - self-hosted
      - router-staging
    environment: router-staging
    timeout-minutes: 45
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout candidate revision
        uses: actions/checkout@v4

      - name: Run credentialed stream lifecycle gate
        id: streams
        continue-on-error: true
        run: |
          mkdir -p artifacts/live
          cargo run --locked -- --config "${{ inputs.config_path }}" \
            stream-live-gate \
            --revision "${GITHUB_SHA}" \
            --max-first-chunk-ms 5000 \
            --max-completion-ms 30000 \
            --cancellation-timeout-ms 5000 \
            --shutdown-timeout-ms 5000 \
            --output artifacts/live/stream-promotion.json

      - name: Upload sanitized stream evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-stream-evidence-${{ github.sha }}
          path: artifacts/live/stream-promotion.json
          if-no-files-found: error

      - name: Preserve stream gate failure
        if: steps.streams.outcome != 'success'
        run: exit 1

  deployment-promotion:
    name: Sustained deployment promotion gate
    runs-on:
      - self-hosted
      - router-staging
    environment: router-staging
    timeout-minutes: 45
    env:
      AUTOHAND_ROUTER_TOKEN: ${{ secrets.AUTOHAND_ROUTER_TOKEN }}

    steps:
      - name: Checkout candidate revision
        uses: actions/checkout@v4

      - name: Run revision-matched sustained deployment gate
        id: deployment
        continue-on-error: true
        run: |
          mkdir -p artifacts/live
          cargo run --locked -- --config "${{ inputs.config_path }}" \
            deployment-live-gate \
            --url "${{ inputs.deployment_url }}" \
            --revision "${GITHUB_SHA}" \
            --duration-seconds "${{ inputs.deployment_duration_seconds }}" \
            --requests-per-second 4 \
            --concurrency 8 \
            --min-samples-per-scenario 25 \
            --max-p95-ms 5000 \
            --max-p99-ms 10000 \
            --max-error-rate 0.01 \
            --max-queue-p95-ms 1000 \
            --max-peak-rss-bytes 1073741824 \
            --max-recovery-ms 10000 \
            --accounting-processes 4 \
            --accounting-limit 100 \
            --max-upload-probe-bytes 67108864 \
            --output artifacts/live/deployment-promotion.json

      - name: Upload sanitized deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-deployment-evidence-${{ github.sha }}
          path: artifacts/live/deployment-promotion.json
          if-no-files-found: error

      - name: Preserve deployment gate failure
        if: steps.deployment.outcome != 'success'
        run: exit 1
