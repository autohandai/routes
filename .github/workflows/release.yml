name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version-matched release tag, for example v0.2.0 or v0.2.0-canary.1"
        required: true
        type: string
      release_channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - canary
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Release-blocking quality gates
    uses: ./.github/workflows/quality.yml

  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      channel: ${{ steps.metadata.outputs.channel }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      make_latest: ${{ steps.metadata.outputs.make_latest }}
      crate_name: ${{ steps.metadata.outputs.crate_name }}
      crate_version: ${{ steps.metadata.outputs.crate_version }}
      crate_file: ${{ steps.metadata.outputs.crate_file }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Validate tag, channel, and crate version
        id: metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_CHANNEL: ${{ inputs.release_channel }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
            requested_channel="$INPUT_CHANNEL"
          else
            tag="$REF_NAME"
            requested_channel=""
          fi

          ./scripts/release-metadata.sh "$tag" "$requested_channel" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs:
      - quality
      - metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin routes

      - name: Stage release files
        shell: bash
        run: |
          set -euo pipefail
          asset="routes-${{ matrix.target }}"
          mkdir -p "dist/$asset"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary="routes.exe"
          else
            binary="routes"
          fi
          cp "target/${{ matrix.target }}/release/$binary" "dist/$asset/"
          cp README.md LICENSE "dist/$asset/"

      - name: Archive Unix release
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "dist/routes-${{ matrix.target }}.tar.gz" -C dist "routes-${{ matrix.target }}"

      - name: Archive Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/routes-${{ matrix.target }}/*" -DestinationPath "dist/routes-${{ matrix.target }}.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: routes-${{ matrix.target }}
          path: dist/routes-${{ matrix.target }}.*
          if-no-files-found: error

  crate:
    name: Publish crates.io package and source artifact
    needs:
      - quality
      - metadata
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Package and verify crate
        env:
          CRATE_FILE: ${{ needs.metadata.outputs.crate_file }}
        run: |
          set -euo pipefail
          cargo package --locked
          test -f "target/package/$CRATE_FILE"

      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATE_NAME: ${{ needs.metadata.outputs.crate_name }}
          CRATE_VERSION: ${{ needs.metadata.outputs.crate_version }}
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured" >&2
            exit 1
          fi

          status="$(
            curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
              --user-agent "autohand-routes-release/${CRATE_VERSION} (https://github.com/autohandai/routes)" \
              "https://crates.io/api/v1/crates/${CRATE_NAME}/${CRATE_VERSION}"
          )"

          case "$status" in
            200)
              echo "${CRATE_NAME} ${CRATE_VERSION} is already published; continuing"
              ;;
            404)
              cargo publish --locked
              ;;
            *)
              echo "crates.io version check returned HTTP ${status}" >&2
              exit 1
              ;;
          esac

      - name: Download canonical crates.io package
        env:
          CRATE_NAME: ${{ needs.metadata.outputs.crate_name }}
          CRATE_VERSION: ${{ needs.metadata.outputs.crate_version }}
          CRATE_FILE: ${{ needs.metadata.outputs.crate_file }}
        run: |
          set -euo pipefail
          mkdir -p dist
          curl --fail --location --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 \
            --user-agent "autohand-routes-release/${CRATE_VERSION} (https://github.com/autohandai/routes)" \
            --output "dist/$CRATE_FILE" \
            "https://static.crates.io/crates/${CRATE_NAME}/${CRATE_FILE}"
          sha256sum "dist/$CRATE_FILE"

      - name: Upload crate artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ needs.metadata.outputs.crate_file }}
          path: dist/${{ needs.metadata.outputs.crate_file }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - quality
      - metadata
      - build
      - crate
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout release source
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_CHANNEL: ${{ needs.metadata.outputs.channel }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          tag="$RELEASE_TAG"
          channel="$RELEASE_CHANNEL"
          changelog_path="dist/routes-${tag}-CHANGELOG.md"
          release_notes_path="dist/routes-${tag}-RELEASE_NOTES.md"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            end_ref="$tag"
          else
            end_ref="$GITHUB_SHA"
          fi

          previous_tag="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq '.[] | select(.draft == false) | .tag_name' \
              | grep -Fvx "$tag" \
              | head -n 1 || true
          )"

          if [ -n "$previous_tag" ] && ! git rev-parse -q --verify "refs/tags/$previous_tag" >/dev/null; then
            echo "previous published release tag $previous_tag is not available locally" >&2
            exit 1
          fi

          if [ -n "$previous_tag" ]; then
            range="$previous_tag..$end_ref"
            summary="Changes since \`$previous_tag\`."
          else
            range="$end_ref"
            summary="Initial release changelog."
          fi

          {
            echo "# Routes $tag Changelog"
            echo
            echo "- Channel: \`$channel\`"
            echo "- Previous tag: \`${previous_tag:-none}\`"
            echo
            echo "$summary"
            echo
            echo "## Commits"
            echo
            if git log --no-merges --pretty=format:'- %s (%h)' "$range" | grep .; then
              true
            else
              echo "- No commits found for this range."
            fi
          } > "$changelog_path"

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "changelog_path=$changelog_path" >> "$GITHUB_OUTPUT"
          echo "release_notes_path=$release_notes_path" >> "$GITHUB_OUTPUT"
          echo "changelog_asset=$(basename "$changelog_path")" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        uses: actions/github-script@v9.0.0
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_CHANNEL: ${{ needs.metadata.outputs.channel }}
          CRATE_NAME: ${{ needs.metadata.outputs.crate_name }}
          CRATE_VERSION: ${{ needs.metadata.outputs.crate_version }}
          CRATE_FILE: ${{ needs.metadata.outputs.crate_file }}
          PREVIOUS_TAG: ${{ steps.changelog.outputs.previous_tag }}
          CHANGELOG_PATH: ${{ steps.changelog.outputs.changelog_path }}
          CHANGELOG_ASSET: ${{ steps.changelog.outputs.changelog_asset }}
          RELEASE_NOTES_PATH: ${{ steps.changelog.outputs.release_notes_path }}
        with:
          script: |
            const fs = require("fs");

            let generatedBody;
            try {
              const request = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
                target_commitish: context.sha,
              };

              if (process.env.PREVIOUS_TAG) {
                request.previous_tag_name = process.env.PREVIOUS_TAG;
              }

              const response = await github.rest.repos.generateReleaseNotes(request);
              generatedBody = response.data.body;
            } catch (error) {
              core.warning(`Falling back to local changelog for release notes: ${error.message}`);
              generatedBody = fs.readFileSync(process.env.CHANGELOG_PATH, "utf8");
            }

            const notes = [
              generatedBody.trim(),
              "",
              "## Install with Cargo",
              "",
              "```bash",
              `cargo install ${process.env.CRATE_NAME} --version ${process.env.CRATE_VERSION} --locked`,
              "```",
              "",
              `The same source package published to crates.io is attached as \`${process.env.CRATE_FILE}\`.`,
              "",
              "## Validation evidence",
              "",
              "This release attaches revision-linked controlled benchmark, provider conformance, runtime-gate, and evidence-manifest JSON. The controlled benchmark measures router plus loopback mock overhead and explicitly excludes external-provider variability.",
              "",
              "## Changelog",
              "",
              `A generated changelog is attached as \`${process.env.CHANGELOG_ASSET}\`.`,
              "",
            ].join("\n");

            fs.writeFileSync(process.env.RELEASE_NOTES_PATH, notes);

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: Routes ${{ needs.metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.metadata.outputs.prerelease }}
          make_latest: ${{ needs.metadata.outputs.make_latest }}
          body_path: ${{ steps.changelog.outputs.release_notes_path }}
          files: |
            dist/routes-*.tar.gz
            dist/routes-*.zip
            dist/*.crate
            dist/routes-*-CHANGELOG.md
            dist/routes-*-RELEASE_NOTES.md
            dist/**/router.*.json
