bind: 127.0.0.1:8080
default_model: llama3.1:8b
policy: balanced

auth:
  # Disabled when both lists are empty. Prefer env-backed tokens outside local dev.
  bearer_tokens: []
  bearer_token_env: [AUTOHAND_ROUTER_TOKEN]

budget:
  # Disabled when null. Set accounting.backend=file for shared local multi-process enforcement.
  max_chat_requests:
  max_total_tokens:
  max_estimated_cost_micros:
  accounting:
    backend: process
    file_path:
    lock_timeout_ms: 1000

telemetry:
  # Disabled when null. Writes route/chat.auto decision traces as JSONL.
  decision_log_path:
  # Keep false unless you explicitly want raw prompts in trace files.
  include_inputs: false

runtime:
  # After Ctrl-C, stop accepting new requests and wait this long for in-flight work.
  graceful_shutdown_timeout_ms: 30000
  provider_health_sampler:
    # When enabled during serve, periodically samples provider health endpoints and
    # feeds observed latency/error penalties into routing decisions.
    enabled: false
    interval_ms: 30000
    initial_delay_ms: 500

cache:
  semantic:
    # Opt-in process-local semantic response cache for automatic non-stream chat/Responses.
    enabled: false
    # local-hash is deterministic and does not require a provider call. Set this
    # to any configured model id or alias with embeddings support for real vectors.
    embedding_model: local-hash
    similarity_threshold: 0.92
    ttl_seconds: 3600
    max_entries: 1024

shadow_eval:
  # Opt-in pairwise shadow evaluation for sampled automatic non-stream chat/Responses.
  enabled: false
  sample_rate: 0.01
  output_path: router.shadow-eval.jsonl
  include_bodies: false
  max_body_chars: 4096
  judge:
    # Deterministic local judge for status/content/latency winner labels in JSONL records.
    enabled: true

safety:
  # Opt-in automatic safety routing for auto/router-* chat and Responses requests.
  enabled: false
  unsafe_action: reject
  sensitive_action: allow
  # Required when either action is force_route.
  force_model:
  redaction_replacement: "[redacted]"

sticky_routing:
  # Opt-in process-local affinity for auto/router-* chat and Responses requests.
  enabled: false
  ttl_seconds: 1800
  prefer_model: true

classifier:
  # heuristic is local deterministic fallback. Set backend to llm_judge or route_llm
  # to call a configured small classifier model such as Qwen3.527B.
  backend: heuristic
  confidence_threshold: 0.62
  easy_threshold: 0.28
  hard_threshold: 0.79
  # Compatibility alias for adapters.llm_judge.model.
  llm_judge_model:
  llm_judge_timeout_ms: 2500
  adapters:
    llm_judge:
      model:
      timeout_ms: 2500
      prompt_template:
    route_llm:
      model:
      timeout_ms: 2500
      prompt_template:

scoring:
  # Optional operator hints inspired by OpenRouter/LiteLLM routing controls.
  # Values are deterministic config inputs, so they can come from manual tuning,
  # health samplers, or future control-plane automation without changing routes.
  model_priorities: {}
  provider_priorities: {}
  provider_latency_p95_ms: {}
  provider_health_penalties: {}
  priority_weight: 0.08
  latency_weight: 0.05
  health_weight: 1.0
  balanced:
    capability_fit: 0.60
    domain_bonus: 0.20
    cost: 0.20
    overkill: 1.0
    raw_capability: 0.0
    latency: 0.05
    health: 1.0
  floor:
    # Cheapest acceptable model that still clears capability/context gates.
    capability_fit: 0.34
    domain_bonus: 0.10
    cost: 0.56
    overkill: 1.8
    raw_capability: 0.0
    latency: 0.04
    health: 1.0
  nitro:
    # Fastest healthy model with enough capability.
    capability_fit: 0.44
    domain_bonus: 0.12
    cost: 0.12
    overkill: 0.6
    raw_capability: 0.08
    latency: 0.42
    health: 1.25
  quality:
    # Strongest model when answer quality matters more than marginal cost.
    capability_fit: 0.16
    domain_bonus: 0.10
    cost: 0.02
    overkill: 0.0
    raw_capability: 0.82
    latency: 0.03
    health: 1.0
  cost_efficient:
    capability_fit: 0.42
    domain_bonus: 0.16
    cost: 0.42
    overkill: 1.4
    raw_capability: 0.0
    latency: 0.05
    health: 1.0
  capability_heavy:
    capability_fit: 0.20
    domain_bonus: 0.08
    cost: 0.05
    overkill: 0.0
    raw_capability: 0.72
    latency: 0.05
    health: 1.0
  domain_skills:
    capability_fit: 0.38
    domain_bonus: 0.48
    cost: 0.10
    overkill: 0.0
    raw_capability: 0.10
    latency: 0.05
    health: 1.0

providers:
  - name: ollama
    kind: ollama
    base_url: http://localhost:11434
    chat_path: /v1/chat/completions
    responses_path: /v1/responses
    embeddings_path: /v1/embeddings
    images_path: /v1/images/generations
    speech_path: /v1/audio/speech
    audio_transcriptions_path: /v1/audio/transcriptions
    audio_translations_path: /v1/audio/translations
    health_path: /api/tags
    timeout_ms: 120000
    retries: 1
    max_concurrency: 2
    queue_timeout_ms: 5000

  - name: ollama-native
    kind: ollama_native
    base_url: http://localhost:11434
    chat_path: /api/chat
    responses_path:
    embeddings_path:
    images_path:
    speech_path:
    audio_transcriptions_path:
    audio_translations_path:
    health_path: /api/tags
    timeout_ms: 120000
    retries: 1
    max_concurrency: 2
    queue_timeout_ms: 5000

  - name: llamacpp
    kind: llama_cpp
    base_url: http://localhost:8081
    chat_path: /v1/chat/completions
    responses_path: /v1/responses
    embeddings_path: /v1/embeddings
    images_path: /v1/images/generations
    speech_path: /v1/audio/speech
    audio_transcriptions_path: /v1/audio/transcriptions
    audio_translations_path: /v1/audio/translations
    health_path: /health
    timeout_ms: 120000
    retries: 1
    max_concurrency: 1
    queue_timeout_ms: 5000

  - name: llamacpp-native
    kind: llama_cpp_native
    base_url: http://localhost:8082
    # Native llama.cpp server completion endpoint. Use kind: llama_cpp for its OpenAI-compatible server.
    chat_path: /completion
    responses_path:
    embeddings_path:
    images_path:
    speech_path:
    audio_transcriptions_path:
    audio_translations_path:
    health_path: /health
    timeout_ms: 120000
    retries: 1
    max_concurrency: 1
    queue_timeout_ms: 5000

  - name: vllm
    kind: vllm
    base_url: http://localhost:8000
    chat_path: /v1/chat/completions
    responses_path: /v1/responses
    embeddings_path: /v1/embeddings
    images_path:
    speech_path:
    audio_transcriptions_path: /v1/audio/transcriptions
    audio_translations_path: /v1/audio/translations
    health_path: /health
    timeout_ms: 120000
    retries: 1
    max_concurrency: 8
    queue_timeout_ms: 10000

  - name: openrouter
    kind: openrouter
    base_url: https://openrouter.ai/api
    chat_path: /v1/chat/completions
    responses_path: /v1/responses
    embeddings_path: /v1/embeddings
    images_path: /v1/images/generations
    speech_path: /v1/audio/speech
    audio_transcriptions_path: /v1/audio/transcriptions
    audio_translations_path: /v1/audio/translations
    health_path: /v1/models
    api_key_env: OPENROUTER_API_KEY
    timeout_ms: 120000
    retries: 2
    max_concurrency: 8
    queue_timeout_ms: 10000
    extra_headers:
      HTTP-Referer: https://autohand.ai
      X-Title: Autohand Router

  - name: cloudflare
    kind: cloudflare_ai_gateway
    # Example for Cloudflare AI Gateway OpenAI-compatible routing:
    # https://gateway.ai.cloudflare.com/v1/{account_id}/{gateway_id}/openai
    base_url: https://gateway.ai.cloudflare.com/v1/ACCOUNT_ID/GATEWAY_ID/openai
    chat_path: /v1/chat/completions
    responses_path: /v1/responses
    embeddings_path: /v1/embeddings
    images_path: /v1/images/generations
    speech_path: /v1/audio/speech
    audio_transcriptions_path: /v1/audio/transcriptions
    audio_translations_path: /v1/audio/translations
    health_path: /v1/models
    api_key_env: CLOUDFLARE_API_TOKEN
    timeout_ms: 120000
    retries: 2
    max_concurrency: 8
    queue_timeout_ms: 10000

models:
