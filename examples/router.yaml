    aliases: [local-fast, cheap]
    capability: 0.35
    cost_per_million_input: 0.05
    cost_per_million_output: 0.05
    domains: [general, summary, coding]
    context_window: 128000
    capabilities:
      supports_json: true
      supports_code: true
      supports_long_context: true
    local: true

