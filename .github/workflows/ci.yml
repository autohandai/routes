name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Release-blocking quality gates
    uses: ./.github/workflows/quality.yml

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust tooling
        run: rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build routes
        run: cargo build --locked --bin routes

      - name: Validate example config
        run: cargo run --locked -- --config examples/router.yaml validate

      - name: Test
        run: cargo test --locked
