bind: 0.0.0.0:8080
default_model: open-weight-coder
policy: balanced

auth:
  bearer_tokens: []
  bearer_token_env: [AUTOHAND_ROUTER_TOKEN]
  allow_unauthenticated_network: false

budget:
  max_chat_requests:
  max_total_tokens:
  max_estimated_cost_micros:
  accounting:
    backend: process
    file_path:
    lock_timeout_ms: 1000

telemetry:
  decision_log_path:
  include_inputs: false

cache:
  semantic:
    enabled: false
    embedding_model: local-hash
    similarity_threshold: 0.92
    ttl_seconds: 3600
    max_entries: 1024
    # Use backend: file with a shared path when running multiple local replicas.
    backend: memory
    file_path:
    lock_timeout_ms: 1000

shadow_eval:
  enabled: false
  sample_rate: 0.01
  output_path: router.shadow-eval.jsonl
  include_bodies: false
  max_body_chars: 4096
  judge:
    enabled: true
    # Omit model for deterministic local labels; set a configured model id or
    # alias for LLM answer-quality judgements.
    model:
    timeout_ms: 5000
    prompt_template:

runtime:
  graceful_shutdown_timeout_ms: 30000

safety:
  enabled: false
  unsafe_action: reject
  sensitive_action: allow
  force_model:
  redaction_replacement: "[redacted]"

sticky_routing:
  enabled: false
  ttl_seconds: 1800
  prefer_model: true
  # Use backend: file with a shared path when running multiple local replicas.
  backend: memory
  file_path:
  lock_timeout_ms: 1000

classifier:
  backend: heuristic
  confidence_threshold: 0.62
  easy_threshold: 0.28
  hard_threshold: 0.79
  llm_judge_model:
  llm_judge_timeout_ms: 2500
  adapters:
    llm_judge:
      model:
      timeout_ms: 2500
      prompt_template:
    route_llm:
      model:
      timeout_ms: 2500
      prompt_template:

scoring:
  learned:
    enabled: false
    weight: 0.0
    bias: 0.0
    feature_weights: {}
    model_biases: {}
  balanced:
    capability_fit: 0.60
    domain_bonus: 0.20
    cost: 0.20
    overkill: 1.0
    raw_capability: 0.0
    latency: 0.05
    health: 1.0
  lowest_cost_acceptable:
